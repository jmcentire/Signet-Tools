server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Markdown content negotiation: serve llms-full.txt when an agent
    # requests text/markdown on /. Falls through to index.html otherwise.
    # $http_accept is matched loosely; anything containing "text/markdown"
    # wins. This is the cheapest "C1" satisfier without an edge worker.
    set $md_accept 0;
    if ($http_accept ~* "text/markdown") {
        set $md_accept 1;
    }

    location = / {
        add_header Link "</.well-known/api-catalog>; rel=\"api-catalog\", </llms.txt>; rel=\"alternate\"; type=\"text/markdown\"" always;
        if ($md_accept = 1) {
            rewrite ^ /llms-full.txt last;
        }
        try_files /index.html =404;
    }

    # Well-known JSON endpoints — force correct Content-Type so probes and
    # clients do not see text/plain or text/html on JSON bodies.
    location = /.well-known/mcp/server-card.json {
        default_type application/json;
        add_header Cache-Control "public, max-age=300" always;
    }

    location = /.well-known/agent-skills/index.json {
        default_type application/json;
        add_header Cache-Control "public, max-age=300" always;
    }

    # RFC 9727 linkset requires the linkset+json media type.
    location = /.well-known/api-catalog {
        default_type application/linkset+json;
        add_header Cache-Control "public, max-age=300" always;
    }

    # llms.txt / llms-full.txt served as markdown (text/markdown is correct
    # per llmstxt.org; agents prefer it over text/plain).
    location = /llms.txt {
        default_type "text/markdown; charset=utf-8";
        add_header Cache-Control "public, max-age=300" always;
    }

    location = /llms-full.txt {
        default_type "text/markdown; charset=utf-8";
        add_header Cache-Control "public, max-age=300" always;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/markdown text/css application/json application/linkset+json application/javascript text/xml application/xml text/javascript image/svg+xml;
}
